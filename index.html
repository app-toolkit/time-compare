<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>时区对比 · Time Compare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 终端琥珀主题：工业感、高对比、全等宽 -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"JetBrains Mono"', "ui-monospace", "monospace"],
              mono: ['"JetBrains Mono"', "ui-monospace", "monospace"],
            },
            colors: {
              paper: "#0a0a0a",
              card: "#141414",
              ink: "#fafafa",
              inkMuted: "#a3a3a3",
              border: "#262626",
              primary: "#f59e0b",
              primaryLight: "#1c1917",
              rowHover: "#1f1f1f",
              weekend: "#ef4444",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(245, 158, 11, 0.06), transparent);
      }
      .strip-scroll {
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
      }
      .strip-scroll::-webkit-scrollbar {
        height: 6px;
      }
      .strip-scroll::-webkit-scrollbar-track {
        background: #141414;
      }
      .strip-scroll::-webkit-scrollbar-thumb {
        background: #404040;
        border-radius: 3px;
      }
      .strip-scroll::-webkit-scrollbar-thumb:hover {
        background: #f59e0b;
      }
      .select-band {
        pointer-events: none;
        background: #1c1917;
        border: 2px solid #f59e0b;
        box-shadow: 0 0 12px rgba(245, 158, 11, 0.15);
      }
      .select-band .select-band-cell {
        color: #fbbf24;
        font-weight: 600;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .hour-cell {
        transition: background-color 0.15s ease;
      }
      .hour-cell:hover {
        background-color: rgba(245, 158, 11, 0.08);
      }
    </style>
  </head>
  <body class="min-h-screen bg-paper text-ink font-mono antialiased">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 py-6 sm:py-8">
      <header class="mb-6">
        <h1 class="text-xl sm:text-2xl font-semibold text-ink">时区对比</h1>
        <p class="text-inkMuted text-sm mt-0.5">
          鼠标在时间条上左右移动即可框选对比；默认选中当前时间
        </p>
        <div class="mt-4 flex flex-wrap items-center gap-2">
          <div class="relative flex-1 min-w-[180px] max-w-sm">
            <input
              type="text"
              id="tz-input"
              list="tz-datalist"
              placeholder="+ 输入时区，如 Asia/Shanghai"
              class="w-full rounded-lg border border-border bg-card px-3 py-2.5 pl-9 text-sm text-ink placeholder-inkMuted focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/30 font-mono"
              autocomplete="off"
            />
            <span
              class="absolute left-3 top-1/2 -translate-y-1/2 text-inkMuted text-lg leading-none"
              >+</span
            >
          </div>
          <button
            type="button"
            id="tz-add"
            class="rounded-md bg-primary text-paper px-4 py-2.5 text-sm font-medium hover:bg-amber-500 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-colors"
          >
            添加
          </button>
        </div>
        <datalist id="tz-datalist"></datalist>
      </header>

      <div class="rounded-lg border border-border bg-card overflow-hidden">
        <div class="flex">
          <div
            class="w-[200px] sm:w-[260px] flex-shrink-0 flex flex-col border-r border-border"
          >
            <div
              class="h-10 flex-shrink-0 flex items-end px-3 pb-1.5 text-xs text-inkMuted font-mono border-b border-border"
            >
              IANA 时区 · 当前时间
            </div>
            <div id="tz-labels" class="flex flex-col"></div>
          </div>
          <div id="strip-wrap" class="flex-1 min-w-0 strip-scroll relative">
            <div id="strip-inner" class="relative" style="width: 1px">
              <div
                id="date-row"
                class="flex h-10 flex-shrink-0 border-b border-border items-end font-mono text-xs"
              ></div>
              <div id="tz-rows" class="flex flex-col"></div>
              <div
                id="select-band"
                class="select-band absolute left-0 w-[44px] rounded-sm flex flex-col hidden"
                style="top: 40px"
              ></div>
            </div>
          </div>
        </div>
      </div>

      <p class="mt-3 text-xs text-inkMuted">
        默认：Asia/Shanghai、America/Los_Angeles。横轴为第一个时区当日 0–23
        时；每行 0 时格显示该时区当日日期（跨天可见）。
      </p>
    </div>

    <script>
      (function () {
        const HOURS_TOTAL = 24;
        const CELL_WIDTH = 44;
        const ROW_HEIGHT = 48;
        const DEFAULT_ZONES = ["Asia/Shanghai", "America/Los_Angeles"];

        const tzInput = document.getElementById("tz-input");
        const tzAdd = document.getElementById("tz-add");
        const tzLabels = document.getElementById("tz-labels");
        const tzRows = document.getElementById("tz-rows");
        const stripWrap = document.getElementById("strip-wrap");
        const stripInner = document.getElementById("strip-inner");
        const dateRow = document.getElementById("date-row");
        const selectBand = document.getElementById("select-band");
        const datalist = document.getElementById("tz-datalist");

        let zones = [];
        let selCol = 0;

        function getMidnightInZone(iana) {
          const now = new Date();
          const fmt = new Intl.DateTimeFormat("en-CA", {
            timeZone: iana,
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
          });
          const [y, m, d] = fmt.format(now).split("-").map(Number);
          const utcNoon = Date.UTC(y, m - 1, d, 12, 0, 0);
          const hourParts = new Intl.DateTimeFormat("en-US", {
            timeZone: iana,
            hour: "numeric",
            hour12: false,
          }).formatToParts(new Date(utcNoon));
          const H = Number.parseInt(
            hourParts.find((p) => p.type === "hour").value,
            10,
          );
          return utcNoon - H * 3600000;
        }

        function getBaseMs() {
          return zones.length ? getMidnightInZone(zones[0]) : Date.now();
        }

        function getLocalHour(iana, timestamp) {
          const formatter = new Intl.DateTimeFormat("en-US", {
            timeZone: iana,
            hour: "numeric",
            hour12: false,
          });
          return Number.parseInt(formatter.format(new Date(timestamp)), 10);
        }

        function getStoredZones() {
          try {
            const raw = localStorage.getItem("time-compare-zones");
            if (raw) {
              const parsed = JSON.parse(raw);
              if (Array.isArray(parsed) && parsed.length > 0) return parsed;
            }
          } catch {
            /* ignore */
          }
          return [...DEFAULT_ZONES];
        }

        function setStoredZones(list) {
          try {
            localStorage.setItem("time-compare-zones", JSON.stringify(list));
          } catch {
            /* ignore */
          }
        }

        function formatTime(iana) {
          return new Intl.DateTimeFormat("zh-CN", {
            timeZone: iana,
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: false,
          }).format(new Date());
        }

        function formatDateShort(iana, timestamp) {
          return new Intl.DateTimeFormat("en-US", {
            timeZone: iana,
            weekday: "short",
            month: "short",
            day: "numeric",
          }).format(new Date(timestamp));
        }

        function formatDateMonthDay(iana, timestamp) {
          return new Intl.DateTimeFormat("en-US", {
            timeZone: iana,
            month: "short",
            day: "numeric",
          }).format(new Date(timestamp));
        }

        function escapeHtml(s) {
          const div = document.createElement("div");
          div.textContent = s;
          return div.innerHTML;
        }

        function buildDateRow() {
          const baseMs = getBaseMs();
          const firstTz = zones[0];
          dateRow.innerHTML = "";
          for (let c = 0; c < HOURS_TOTAL; c++) {
            const ms = baseMs + c * 3600000;
            const hour = c % 24;
            const isFirstOfDay = hour === 0;
            const el = document.createElement("div");
            el.className =
              "hour-cell flex-shrink-0 flex items-center justify-center text-inkMuted font-mono text-xs";
            el.style.width = CELL_WIDTH + "px";
            el.style.height = "100%";
            if (isFirstOfDay) {
              el.textContent = firstTz ? formatDateMonthDay(firstTz, ms) : "";
              el.classList.add("bg-primary/10", "text-primary", "font-medium");
            } else {
              el.textContent = hour;
            }
            dateRow.appendChild(el);
          }
        }

        function renderLabel(iana) {
          const wrap = document.createElement("div");
          wrap.className =
            "flex items-center justify-between gap-1 px-3 py-2 border-b border-border last:border-b-0 min-h-[48px]";
          wrap.innerHTML = `
          <div class="min-w-0 flex-1">
            <div class="font-mono text-sm text-ink truncate" title="${escapeHtml(iana)}">${escapeHtml(iana)}</div>
            <div class="text-inkMuted text-xs font-mono mt-0.5" data-now></div>
          </div>
          <button type="button" data-remove class="flex-shrink-0 w-7 h-7 rounded text-inkMuted hover:text-ink hover:bg-border flex items-center justify-center text-sm" title="移除">×</button>
        `;
          wrap.querySelector("[data-now]").textContent = formatTime(iana);
          wrap.dataset.iana = iana;
          tzLabels.appendChild(wrap);
        }

        function renderRow(iana) {
          const baseMs = getBaseMs();
          const row = document.createElement("div");
          row.className = "flex border-b border-border last:border-b-0";
          row.style.height = ROW_HEIGHT + "px";
          row.dataset.iana = iana;

          for (let c = 0; c < HOURS_TOTAL; c++) {
            const ms = baseMs + c * 3600000;
            const hour = getLocalHour(iana, ms);
            const cell = document.createElement("div");
            cell.className =
              "hour-cell flex-shrink-0 flex items-center justify-center border-r border-border/60 font-mono text-sm text-ink";
            cell.style.width = CELL_WIDTH + "px";
            cell.style.height = "100%";
            const isDay = hour >= 6 && hour < 21;
            if (isDay) cell.classList.add("bg-primaryLight/40");
            if (hour === 0) {
              cell.textContent = formatDateMonthDay(iana, ms);
              cell.classList.add("text-primary", "font-medium");
            } else {
              cell.textContent = hour;
            }
            cell.title = formatDateShort(iana, ms) + " " + hour + ":00";
            row.appendChild(cell);
          }
          tzRows.appendChild(row);
        }

        function getCurrentTimeCol() {
          if (!zones.length) return 0;
          const baseMs = getBaseMs();
          const iana = zones[0];
          const now = new Date();
          const dateFmt = new Intl.DateTimeFormat("en-CA", {
            timeZone: iana,
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
          });
          const baseDateStr = dateFmt.format(new Date(baseMs));
          const nowDateStr = dateFmt.format(now);
          const hourParts = new Intl.DateTimeFormat("en-US", {
            timeZone: iana,
            hour: "numeric",
            hour12: false,
          }).formatToParts(now);
          const hour = Number.parseInt(
            hourParts.find((p) => p.type === "hour").value,
            10,
          );
          let col = hour;
          if (nowDateStr > baseDateStr) col = 23;
          else if (nowDateStr < baseDateStr) col = 0;
          return Math.max(0, Math.min(HOURS_TOTAL - 1, col));
        }

        function colFromMouseEvent(e) {
          const rect = stripWrap.getBoundingClientRect();
          const x = e.clientX - rect.left + stripWrap.scrollLeft;
          const col = Math.floor(x / CELL_WIDTH);
          return Math.max(0, Math.min(HOURS_TOTAL - 1, col));
        }

        function updateBand() {
          const baseMs = getBaseMs();
          const left = selCol * CELL_WIDTH;
          selectBand.style.left = left + "px";
          selectBand.style.height = zones.length * ROW_HEIGHT + "px";
          selectBand.style.display = zones.length ? "flex" : "none";
          selectBand.innerHTML = "";
          zones.forEach((iana) => {
            const ms = baseMs + selCol * 3600000;
            const hour = getLocalHour(iana, ms);
            const line = document.createElement("div");
            line.className =
              "select-band-cell flex items-center justify-center font-mono flex-shrink-0 text-sm";
            line.style.height = ROW_HEIGHT + "px";
            line.textContent =
              hour === 0 ? formatDateMonthDay(iana, ms) : String(hour);
            selectBand.appendChild(line);
          });
        }

        function scrollToCol(col) {
          const stripEl = stripWrap;
          const targetLeft =
            col * CELL_WIDTH - stripEl.clientWidth / 2 + CELL_WIDTH / 2;
          const maxScroll = stripInner.offsetWidth - stripEl.clientWidth;
          stripEl.scrollLeft = Math.max(0, Math.min(maxScroll, targetLeft));
        }

        stripInner.style.width = HOURS_TOTAL * CELL_WIDTH + "px";

        stripWrap.addEventListener("mousemove", function (e) {
          const col = colFromMouseEvent(e);
          if (col !== selCol) {
            selCol = col;
            updateBand();
          }
        });

        function rebuildStrip() {
          buildDateRow();
          tzRows.innerHTML = "";
          zones.forEach(renderRow);
          updateBand();
        }

        function removeZone(iana) {
          const wasFirst = zones[0] === iana;
          zones = zones.filter((z) => z !== iana);
          setStoredZones(zones);
          tzLabels
            .querySelectorAll(`[data-iana="${iana}"]`)
            .forEach((el) => el.remove());
          if (wasFirst) rebuildStrip();
          else
            tzRows
              .querySelectorAll(`[data-iana="${iana}"]`)
              .forEach((el) => el.remove());
          updateBand();
        }

        function addZone(iana) {
          iana = iana.trim();
          if (!iana) return false;
          try {
            new Intl.DateTimeFormat("en", { timeZone: iana });
          } catch {
            return false;
          }
          if (zones.includes(iana)) return true;
          const wasFirst = zones[0];
          zones.push(iana);
          setStoredZones(zones);
          renderLabel(iana);
          if (!wasFirst && zones.length === 1) rebuildStrip();
          else renderRow(iana);
          updateBand();
          return true;
        }

        function updateClocks() {
          tzLabels.querySelectorAll("[data-iana]").forEach((wrap) => {
            const iana = wrap.dataset.iana;
            const el = wrap.querySelector("[data-now]");
            if (el) el.textContent = formatTime(iana);
          });
          updateBand();
        }

        function fillDatalist() {
          const list = Intl.supportedValuesOf
            ? Intl.supportedValuesOf("timeZone")
            : [];
          datalist.innerHTML = "";
          list.slice(0, 400).forEach((tz) => {
            const opt = document.createElement("option");
            opt.value = tz;
            datalist.appendChild(opt);
          });
        }

        tzAdd.addEventListener("click", function () {
          const raw = tzInput.value.trim();
          if (!raw) return;
          const added = addZone(raw);
          if (added) tzInput.value = "";
          else
            alert(
              "无效的时区，请使用 IANA 名称，如 Asia/Shanghai、America/Los_Angeles",
            );
        });

        tzInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            tzAdd.click();
          }
        });

        tzLabels.addEventListener("click", function (e) {
          const btn = e.target.closest("[data-remove]");
          if (!btn) return;
          const wrap = btn.closest("[data-iana]");
          if (wrap) removeZone(wrap.dataset.iana);
        });

        zones = getStoredZones();
        zones.forEach(renderLabel);
        buildDateRow();
        zones.forEach(renderRow);
        selCol = getCurrentTimeCol();
        updateBand();
        scrollToCol(selCol);

        setInterval(updateClocks, 1000);
        fillDatalist();
      })();
    </script>
  </body>
</html>
